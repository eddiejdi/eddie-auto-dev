name: Build & Publish Extension

on:
  push:
    branches: [main]
    paths:
      - 'tools/tools/rpa4all-chrome-extension/**'
      - 'tools/tools/rpa4all-form-autofill-extension-unpacked/**'
  workflow_dispatch:
    inputs:
      crx_url_override:
        description: 'Public ZIP URL (leave blank to use default)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build extension packages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from manifest
        id: version
        run: |
          MANIFEST="tools/tools/rpa4all-chrome-extension/manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(node -e "try{console.log(require('./${MANIFEST}').version)}catch(e){}" 2>/dev/null)
          if [ -z "$VERSION" ]; then
            VERSION=$(python3 -c "import json; print(json.load(open('${MANIFEST}')).get('version','0.0.0'))" 2>/dev/null || echo "0.0.0")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extension version: ${VERSION}"

      - name: Build Chrome extension
        working-directory: tools/tools/rpa4all-chrome-extension
        run: |
          CRX_URL="${{ github.event.inputs.crx_url_override }}"
          if [ -z "$CRX_URL" ]; then
            CRX_URL="https://www.rpa4all.com/extension-updates/rpa4all-autofill-${{ steps.version.outputs.version }}.zip"
          fi
          node build.js --out dist --crx-url "$CRX_URL"

      - name: Build Firefox extension
        working-directory: tools/tools/rpa4all-form-autofill-extension-unpacked
        run: |
          mkdir -p dist
          zip -j "dist/rpa4all-autofill-firefox-${{ steps.version.outputs.version }}.zip" \
            autofill-core.js background.js content-script.js manifest.json \
            options.css options.html options.js popup.css popup.html popup.js \
            sample-masses.json README.md 2>/dev/null || true

      - name: Run selftests
        run: |
          node tools/tools/rpa4all-chrome-extension/selftest.js
          node tools/tools/rpa4all-form-autofill-extension-unpacked/selftest.js

      - name: Upload Chrome artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpa4all-autofill-chrome
          path: tools/tools/rpa4all-chrome-extension/dist/
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Firefox artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpa4all-autofill-firefox
          path: tools/tools/rpa4all-form-autofill-extension-unpacked/dist/
          retention-days: 90
          if-no-files-found: warn

      - name: Setup SSH for homelab deploy
        if: "${{ secrets.DEPLOY_SSH_KEY != '' }}"
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to homelab
        if: "${{ secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_HOST != '' }}"
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          REMOTE_DIR="/var/www/rpa4all/extension-updates"
          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $REMOTE_DIR"
          scp -o StrictHostKeyChecking=no \
            "tools/tools/rpa4all-chrome-extension/dist/rpa4all-autofill-${VERSION}.zip" \
            tools/tools/rpa4all-chrome-extension/dist/update.xml \
            tools/tools/rpa4all-chrome-extension/dist/latest.json \
            "$DEPLOY_USER@$DEPLOY_HOST:$REMOTE_DIR/"

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: extension-v${{ steps.version.outputs.version }}
          name: RPA4ALL Autofill v${{ steps.version.outputs.version }}
          make_latest: false
          fail_on_unmatched_files: false
          files: tools/tools/rpa4all-chrome-extension/dist/*.zip
