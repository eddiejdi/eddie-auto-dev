name: CF Token Diagnostic

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: [self-hosted, homelab, homelab-only]
    steps:
      - name: Verificar permissoes do token e arquivos CF
        run: |
          echo "=== Arquivos Cloudflare no homelab ==="
          find /etc/cloudflare /home/homelab/.cloudflared /root/.cloudflared /etc/cloudflared -type f 2>/dev/null | sort || echo "(nenhum encontrado)"
          echo
          echo "=== Variaveis de ambiente CF ==="
          env | grep -i "cloudflare\|CF_\|ZERO_TRUST" | grep -v TOKEN | head -20 || true
          echo
          echo "=== Verificar permissoes do token atual ==="
          TOKEN=$(cat /etc/cloudflare/ddns-token 2>/dev/null || true)
          if [ -n "$TOKEN" ]; then
            echo "Token encontrado, verificando via API..."
            curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.cloudflare.com/client/v4/user/tokens/verify" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print('Status:', d.get('result',{}).get('status','')); print('Success:', d.get('success',''))"
            echo
            echo "Tentando listar Access Apps com token atual..."
            RESP=$(curl -s -H "Authorization: Bearer $TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/7bfa0a7f608d5f4b924f3455cae8c6e6/access/apps?per_page=5")
            echo "Access Apps response:" 
            echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print('success:', d.get('success')); print('errors:', d.get('errors'))"
          fi
          echo
          echo "=== cloudflared version e status tunnel ==="
          cloudflared --version 2>/dev/null || true
          systemctl is-active cloudflared 2>/dev/null || true
