name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Compile tracked Python sources
        run: |
          set -euo pipefail
          files=$(git ls-files '*.py' | \
            grep -Ev '^(shared-copilot|dev_projects|solutions|backups|\.venv|venv)/' || true)
          if [ -z "$files" ]; then
            echo "No tracked Python files to compile."
            exit 0
          fi
          while IFS= read -r file; do
            echo "Checking $file"
            python -m py_compile "$file"
          done <<< "$files"

      - name: Validate workflow YAML
        run: |
          set -euo pipefail
          for file in .github/workflows/*.yml; do
            python -c "import sys, yaml; yaml.safe_load(open(sys.argv[1], encoding='utf-8'))" "$file"
            echo "OK $file"
          done

      - name: Validate key dashboard JSON
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          for rel in [
              "grafana/btc_trading_dashboard_v3_prometheus.json",
          ]:
              json.loads(Path(rel).read_text(encoding="utf-8"))
              print(f"OK {rel}")
          PY

  tests:
    name: Targeted Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pytest numpy httpx requests

      - name: Run targeted pytest suite
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_position_sizing.py \
            tests/test_grafana_dashboard_queries.py \
            tests/test_ollama_trade_controls.py

  selenium-site-tests:
    name: Selenium Site E2E
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install browser dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser fonts-liberation 2>/dev/null || true
          python -m pip install --upgrade pip
          python -m pip install selenium webdriver-manager

      - name: Start local site server
        run: |
          set -euo pipefail
          python scripts/serve_site.py &
          sleep 2
          curl -fsS http://localhost:3000/ >/dev/null

      - name: Run Selenium tests
        env:
          SITE_URL: http://localhost:3000
          HOMELAB_HOST: localhost
          AGENT_CHAT_URL: http://localhost:3000
          MONITOR_URL: http://localhost:3000
          DASHBOARD_URL: http://localhost:3000
          API_DOCS_URL: http://localhost:3000
        run: |
          set -euo pipefail
          python scripts/automation/test_rpa_selenium.py
