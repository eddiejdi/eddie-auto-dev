name: Deploy Grafana Dashboards

on:
  push:
    branches: [main]
    paths:
      - "monitoring/grafana/provisioning/dashboards/**/*.json"
      - "monitoring/grafana/provisioning/dashboards/dashboards.yml"
      - "monitoring/grafana/provisioning/datasources/datasources.yml"
      - "tools/validate_grafana_dashboards.py"
  workflow_dispatch:
    inputs:
      target:
        description: "Arquivo relativo ao repo dentro de monitoring/grafana/provisioning (deixe vazio para tudo)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (valida JSON sem fazer deploy)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  deploy-dashboards:
    name: Deploy Grafana Dashboards
    runs-on: [self-hosted, linux]
    env:
      HOMELAB_HOST: ${{ secrets.HOMELAB_HOST }}
      HOMELAB_USER: ${{ secrets.HOMELAB_USER || 'homelab' }}
      GRAFANA_PROVISIONING_BASE: /home/${{ secrets.HOMELAB_USER || 'homelab' }}/monitoring/grafana/provisioning
      GRAFANA_URL: ${{ secrets.GRAFANA_URL || 'http://192.168.15.2:3002' }}
      GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_USER || 'admin' }}
      GRAFANA_ADMIN_PASS: ${{ secrets.GRAFANA_PASS }}
      PROMETHEUS_URL: http://127.0.0.1:9090

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HOMELAB_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOMELAB_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sincronizar config base de provisioning
        run: |
          test -n "$HOMELAB_HOST" || { echo "❌ HOMELAB_HOST não configurado"; exit 1; }
          rsync -av --mkpath \
            monitoring/grafana/provisioning/dashboards/dashboards.yml \
            "$HOMELAB_USER@$HOMELAB_HOST:$GRAFANA_PROVISIONING_BASE/dashboards/dashboards.yml"
          echo "✅ dashboards.yml sincronizado"

      - name: Detectar arquivos alterados de provisioning
        id: changed_files
        run: |
          INPUT="${{ github.event.inputs.target }}"
          if [ -n "$INPUT" ]; then
            FILES="$INPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            FILES="$(
              git diff --name-only HEAD^ HEAD \
              | grep -E '^monitoring/grafana/provisioning/(dashboards/.+\.json|datasources/datasources\.yml)$' \
              | tr '\n' ' ' | xargs
            )"
          else
            FILES="$(
              find monitoring/grafana/provisioning \( -path '*/dashboards/*.json' -o -path '*/dashboards/*/*.json' -o -path '*/datasources/datasources.yml' \) -type f \
              | sort -u | tr '\n' ' ' | xargs
            )"
          fi
          COUNT=$(echo "$FILES" | xargs -n1 | sed '/^$/d' | wc -l)
          DASHBOARD_FILES="$(echo "$FILES" | xargs -n1 | grep '^monitoring/grafana/provisioning/dashboards/.+\.json$' | tr '\n' ' ' | xargs || true)"
          DATASOURCES_CHANGED=false
          if echo "$FILES" | xargs -n1 | grep -q '^monitoring/grafana/provisioning/datasources/datasources\.yml$'; then
            DATASOURCES_CHANGED=true
          fi
          echo "Arquivos a processar: $FILES"
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "dashboard_files=$DASHBOARD_FILES" >> $GITHUB_OUTPUT
          echo "datasources_changed=$DATASOURCES_CHANGED" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Validar arquivos de provisioning
        if: ${{ steps.changed_files.outputs.has_files == 'true' }}
        run: |
          for f in ${{ steps.changed_files.outputs.files }}; do
            case "$f" in
              *.json)
                echo "Validando JSON $f..."
                python3 -c "import json; json.load(open('$f'))" || { echo "❌ JSON inválido: $f"; exit 1; }
                echo "  ✅ JSON válido"
                ;;
              *.yml|*.yaml)
                echo "Validando YAML $f..."
                python3 -c "import yaml; yaml.safe_load(open('$f'))" || { echo "❌ YAML inválido: $f"; exit 1; }
                echo "  ✅ YAML válido"
                ;;
              *)
                echo "❌ Tipo de arquivo não suportado: $f"
                exit 1
                ;;
            esac
          done

      - name: Validar painéis canônicos contra backends reais
        if: ${{ steps.changed_files.outputs.has_files == 'true' }}
        run: |
          python3 tools/validate_grafana_dashboards.py \
            monitoring/grafana/provisioning/dashboards \
            --recursive \
            --prometheus-url "$PROMETHEUS_URL" \
            --grafana-url "$GRAFANA_URL" \
            --grafana-user "$GRAFANA_ADMIN_USER" \
            --grafana-pass "$GRAFANA_ADMIN_PASS"

      - name: Sincronizar provisioning canônico
        if: ${{ steps.changed_files.outputs.has_files == 'true' && github.event.inputs.dry_run != 'true' }}
        run: |
          for f in ${{ steps.changed_files.outputs.files }}; do
            rel="${f#monitoring/grafana/provisioning/}"
            dest="$GRAFANA_PROVISIONING_BASE/$rel"
            echo "━━━ Sincronizando $f -> $dest"
            rsync -av --mkpath "$f" "$HOMELAB_USER@$HOMELAB_HOST:$dest"
          done
          echo "━━━ Reiniciando Grafana para recarregar provisioning"
          ssh "$HOMELAB_USER@$HOMELAB_HOST" 'docker restart grafana >/dev/null'
          echo "✅ Provisioning sincronizado e Grafana reiniciado"

      - name: Dry run — listar painéis
        if: ${{ steps.changed_files.outputs.has_files == 'true' && github.event.inputs.dry_run == 'true' }}
        run: |
          for f in ${{ steps.changed_files.outputs.dashboard_files }}; do
            echo "━━━ Painéis em $f:"
            python3 -c "
          import json, sys
          d = json.load(open('$f'))
          panels = d.get('panels', d.get('dashboard', {}).get('panels', []))
          for p in panels:
              print(f'  [{p.get(\"id\",\"?\")}] {p.get(\"title\",\"?\")}')
          print(f'Total: {len(panels)} painéis')
            "
          done

      - name: Sem alterações de dashboard
        if: ${{ steps.changed_files.outputs.has_files != 'true' }}
        run: echo "Nenhum arquivo de provisioning alterado para sincronizar."

      - name: Resumo
        run: |
          echo "### Deploy Grafana" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana URL | \`$GRAFANA_URL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Provisioning Base | \`$GRAFANA_PROVISIONING_BASE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivos | \`${{ steps.changed_files.outputs.count }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | \`${{ github.event.inputs.dry_run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
