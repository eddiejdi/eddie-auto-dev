name: Deploy LTFS Recovery Runtime

on:
  push:
    paths:
      - ".github/workflows/deploy-ltfs-recovery-runtime.yml"
      - "tools/ltfs_recovery.py"
      - "tools/tape_manager.py"
      - "tools/ltfs-lto6-start"
      - "tools/ltfs-lto6-stop"
      - "systemd/ltfs-lto6.service"
      - "systemd/ltfs-lto6-selfheal-escalator.service"
      - "systemd/ltfs-lto6.service.d/80-selfheal-on-failure.conf"
      - "systemd/ltfs-deep-recovery.service"
      - "systemd/ltfs-boot-reconcile.service"
      - "systemd/lto6-selfheal.service"
      - "systemd/ltfs-cache-flush.service.d/70-rearm-timer-on-exit.conf"
      - "tests/test_ltfs_orchestrator_exclusive.py"
      - "tests/test_ltfs_recovery.py"
      - "tests/test_ltfs_boot_reconcile.py"
  workflow_dispatch: {}

jobs:
  test:
    name: Testes LTFS recovery
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar pytest
        run: python -m pip install pytest

      - name: Executar testes LTFS
        run: |
          python -m pytest \
            tests/test_ltfs_orchestrator_exclusive.py \
            tests/test_ltfs_recovery.py \
            tests/test_ltfs_boot_reconcile.py \
            tests/test_tape_orchestrator.py \
            -q --tb=short

  # Deploy na NAS movido para o repo truenas-lto6-app (workflow deploy-host-assets)
  deploy-homelab:
    name: Deploy no Homelab
    needs: test
    runs-on:
      - self-hosted
      - Linux
      - homelab
    timeout-minutes: 10

    steps:
      - name: Baixar sources do commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          WORKDIR="$(mktemp -d)"
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1 -C "$WORKDIR"
          echo "WORKDIR=$WORKDIR" >> "$GITHUB_ENV"

      - name: Instalar script e units LTFS
        run: |
          set -euo pipefail
          tar -C "$WORKDIR" -cf - \
            tools/ltfs_recovery.py \
            tools/tape_manager.py \
            tools/ltfs-lto6-start \
            tools/ltfs-lto6-stop \
            systemd/ltfs-lto6.service \
            systemd/ltfs-deep-recovery.service \
            | ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
                'mkdir -p /tmp/ltfs-gh-deploy && tar -xf - -C /tmp/ltfs-gh-deploy'

          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 '
            sudo -n install -D -m 0755 /tmp/ltfs-gh-deploy/tools/ltfs_recovery.py /usr/local/tools/ltfs_recovery.py
            sudo -n install -D -m 0755 /tmp/ltfs-gh-deploy/tools/tape_manager.py /usr/local/bin/tape-manager
            sudo -n install -D -m 0755 /tmp/ltfs-gh-deploy/tools/ltfs-lto6-start /usr/local/sbin/ltfs-fc-stable-start
            sudo -n install -D -m 0755 /tmp/ltfs-gh-deploy/tools/ltfs-lto6-stop /usr/local/sbin/ltfs-lto6-stop
            sudo -n install -D -m 0644 /tmp/ltfs-gh-deploy/systemd/ltfs-lto6.service /etc/systemd/system/ltfs-lto6.service
            sudo -n install -D -m 0644 /tmp/ltfs-gh-deploy/systemd/ltfs-deep-recovery.service /etc/systemd/system/ltfs-deep-recovery.service
            sudo -n rm -f /etc/systemd/system/ltfs-cache-flush.service.d/70-rearm-timer-on-exit.conf
            sudo -n systemctl daemon-reload
            sudo -n systemctl reset-failed ltfs-lto6.service ltfs-deep-recovery.service ltfs-cache-flush.service || true
          '

      - name: Validar binário instalado
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 '
            python3 /usr/local/tools/ltfs_recovery.py --help >/dev/null
            /usr/local/bin/tape-manager --help >/dev/null
            test -x /usr/local/sbin/ltfs-fc-stable-start
            test -x /usr/local/sbin/ltfs-lto6-stop
            sudo -n systemctl cat ltfs-lto6.service >/dev/null
            sudo -n systemctl cat ltfs-deep-recovery.service >/dev/null
          '
