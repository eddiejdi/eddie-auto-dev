name: Deploy tape-access (fila exclusiva de acesso à fita)

on:
  push:
    branches: [main]
    paths:
      - "tools/tape-access"
      - "tests/test_tape_access_queue.py"
      - ".github/workflows/deploy-tape-access.yml"
  workflow_dispatch: {}

jobs:
  test:
    name: Testes unitários tape-access
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Executar testes
        run: |
          chmod +x tools/tape-access
          python3 -m pytest tests/test_tape_access_queue.py -q --tb=short

  deploy-nas:
    name: Deploy no NAS (rpa4all-nas-001)
    needs: test
    runs-on:
      - self-hosted
      - Linux
      - nas
    timeout-minutes: 10

    steps:
      - name: Baixar sources do commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          WORKDIR="$(mktemp -d)"
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1 -C "$WORKDIR"
          echo "WORKDIR=$WORKDIR" >> "$GITHUB_ENV"

      - name: Guardrail de deploy no NAS
        env:
          NAS_GH_DEPLOY_TOKEN: ${{ secrets.NAS_GH_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NAS_GH_DEPLOY_TOKEN:-}" ]; then
            echo "Secret NAS_GH_DEPLOY_TOKEN ausente. Deploy bloqueado." >&2
            exit 1
          fi
          printf -v TOKEN_Q '%q' "$NAS_GH_DEPLOY_TOKEN"
          printf -v REPO_Q  '%q' "$GITHUB_REPOSITORY"
          printf -v RUN_Q   '%q' "$GITHUB_RUN_ID"
          printf -v ACTOR_Q '%q' "$GITHUB_ACTOR"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 '
              export GH_DEPLOY_TOKEN=${TOKEN_Q}
              export GH_DEPLOY_REPOSITORY=${REPO_Q}
              export GH_DEPLOY_RUN_ID=${RUN_Q}
              export GH_DEPLOY_ACTOR=${ACTOR_Q}
              /usr/local/sbin/nas-gh-deploy-guard deploy-tape-access
            '"

      - name: Instalar tape-access no NAS
        run: |
          set -euo pipefail

          # Copiar script via SSH
          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            "$WORKDIR/tools/tape-access" \
            homelab@192.168.15.2:/tmp/tape-access-deploy

          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "scp -o BatchMode=yes -o StrictHostKeyChecking=no \
              /tmp/tape-access-deploy root@192.168.15.4:/tmp/tape-access-deploy && \
             ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 '
               install -D -m 0755 /tmp/tape-access-deploy /usr/local/sbin/tape-access
               mkdir -p /run/tape-queue
               echo \"tape-access instalado: \$(/usr/local/sbin/tape-access version)\"
             '"

      - name: Validar instalação
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 '
              /usr/local/sbin/tape-access version
              /usr/local/sbin/tape-access status
              /usr/local/sbin/tape-access check && echo LIVRE || echo OCUPADA
            '"

      - name: Verificar integração com ltfs-fc-stable-start
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 '
              grep -q tape-access /usr/local/sbin/ltfs-fc-stable-start    && echo OK: ltfs-fc-stable-start    || echo FALTA: ltfs-fc-stable-start
              grep -q tape-access /usr/local/sbin/lto6-selfheal.sh         && echo OK: lto6-selfheal.sh         || echo FALTA: lto6-selfheal.sh
              grep -q tape-access /usr/local/sbin/export-lto6-metrics.sh   && echo OK: export-lto6-metrics.sh   || echo FALTA: export-lto6-metrics.sh
              grep -q tape-access /usr/local/sbin/nextcloud-tape-backup.sh && echo OK: nextcloud-tape-backup.sh || echo FALTA: nextcloud-tape-backup.sh
            '"
