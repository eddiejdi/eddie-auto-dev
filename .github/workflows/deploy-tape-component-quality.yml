name: Deploy Tape Component Quality

on:
  push:
    branches: [main]
    paths:
      - "tools/tape_component_quality_agent.py"
      - "grafana/dashboards/tape-component-quality.json"
      - "monitoring/grafana/provisioning/dashboards/tape-component-quality-v1.json"
      - "monitoring/prometheus.yml"
      - "systemd/tape-component-quality-exporter.service"
      - ".github/workflows/deploy-tape-component-quality.yml"
  workflow_dispatch: {}

jobs:
  test:
    name: Testes unitarios
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias de teste
        run: pip install pytest

      - name: Executar testes
        run: |
          pytest tests/test_tape_component_quality_agent.py \
                 tests/test_tape_component_quality_monitoring_assets.py \
                 -q --tb=short

  deploy-nas:
    name: Deploy no NAS (rpa4all-nas-001)
    needs: test
    runs-on:
      - self-hosted
      - Linux
      - nas
    timeout-minutes: 15

    steps:
      - name: Baixar sources do commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          WORKDIR="$(mktemp -d)"
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1 -C "$WORKDIR"
          echo "WORKDIR=$WORKDIR" >> "$GITHUB_ENV"

      - name: Instalar exporter no NAS
        run: |
          set -euo pipefail
          DEPLOY_PATH=/usr/local/tools

          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            "$WORKDIR/tools/tape_component_quality_agent.py" \
            homelab@192.168.15.2:/tmp/tape_component_quality_agent.py

          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "scp -o BatchMode=yes -o StrictHostKeyChecking=no \
              /tmp/tape_component_quality_agent.py root@192.168.15.4:/tmp/ && \
             ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 '
               install -D -m 0755 /tmp/tape_component_quality_agent.py \
                 ${DEPLOY_PATH}/tape_component_quality_agent.py
               echo AGENT_INSTALLED
             '"

      - name: Instalar e habilitar servico systemd
        run: |
          set -euo pipefail

          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            "$WORKDIR/systemd/tape-component-quality-exporter.service" \
            homelab@192.168.15.2:/tmp/tape-component-quality-exporter.service

          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "scp -o BatchMode=yes -o StrictHostKeyChecking=no \
              /tmp/tape-component-quality-exporter.service root@192.168.15.4:/etc/systemd/system/ && \
             ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 '
               systemctl daemon-reload
               systemctl enable tape-component-quality-exporter
               systemctl restart tape-component-quality-exporter
               sleep 3
               systemctl is-active tape-component-quality-exporter
               curl -sf http://localhost:9124/metrics | grep tape_component_quality_overall_score | head -2
             '"

      - name: Copiar dashboard para provisioning
        run: |
          set -euo pipefail
          PROV_DIR=/home/homelab/shared-auto-dev/monitoring/grafana/provisioning/dashboards

          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            "$WORKDIR/monitoring/grafana/provisioning/dashboards/tape-component-quality-v1.json" \
            homelab@192.168.15.2:"${PROV_DIR}/tape-component-quality-v1.json"

      - name: Recarregar provisioning e importar dashboard via API
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 bash -s <<'REMOTE'
          set -euo pipefail
          DASHBOARD_FILE="$HOME/shared-auto-dev/grafana/dashboards/tape-component-quality.json"
          GRAFANA_URL="http://localhost:3002/grafana"
          GRAFANA_CREDS="admin:${GRAFANA_PASS:-Shared@2026}"

          # Copiar JSON principal tambem
          cp "$HOME/shared-auto-dev/monitoring/grafana/provisioning/dashboards/tape-component-quality-v1.json" \
             "$HOME/shared-auto-dev/grafana/dashboards/tape-component-quality.json" 2>/dev/null || true

          # Importar via API (sobrescreve)
          if [ -f "$DASHBOARD_FILE" ]; then
            PAYLOAD=$(python3 -c "
          import json, sys
          d = json.load(open('$DASHBOARD_FILE'))
          d.pop('id', None)
          print(json.dumps({'dashboard': d, 'overwrite': True, 'folderId': 0}))
          ")
            curl -sf -X POST "$GRAFANA_URL/api/dashboards/db" \
              -H "Content-Type: application/json" \
              -u "$GRAFANA_CREDS" \
              -d "$PAYLOAD" \
              && echo "DASHBOARD_IMPORTED_OK" \
              || echo "DASHBOARD_IMPORT_FAILED (Grafana pode estar offline)"
          else
            echo "DASHBOARD_FILE_NOT_FOUND: $DASHBOARD_FILE"
          fi

          # Reload do provisioning via API (faz Grafana reler arquivos de provisioning)
          curl -sf -X POST "$GRAFANA_URL/api/admin/provisioning/dashboards/reload" \
            -u "$GRAFANA_CREDS" \
            && echo "PROVISIONING_RELOAD_OK" \
            || echo "PROVISIONING_RELOAD_FAILED (nao fatal)"
          REMOTE

      - name: Deploy prometheus.yml e reload
        run: |
          set -euo pipefail
          PROM_CONFIG="/home/homelab/monitoring/prometheus.yml"

          scp -o BatchMode=yes -o StrictHostKeyChecking=no \
            "$WORKDIR/monitoring/prometheus.yml" \
            homelab@192.168.15.2:"${PROM_CONFIG}"

          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 bash -s <<'REMOTE'
          set -euo pipefail
          PROM_CONFIG="/home/homelab/monitoring/prometheus.yml"

          # Validar config antes de recarregar
          if docker ps --filter name=prometheus -q | grep -q .; then
            docker exec prometheus promtool check config /etc/prometheus/prometheus.yml \
              && echo "CONFIG_OK" \
              || { echo "CONFIG_INVALIDA — abortando reload"; exit 1; }
            docker kill --signal=SIGHUP prometheus
            sleep 3
            echo "PROMETHEUS_RELOAD_OK"
          elif systemctl is-active prometheus &>/dev/null; then
            sudo systemctl reload prometheus
            sleep 3
            echo "PROMETHEUS_RELOAD_OK (systemd)"
          else
            echo "PROMETHEUS_NAO_ENCONTRADO — config salva, reload manual necessario"
          fi
          REMOTE

      - name: Validar metricas no Prometheus
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no homelab@192.168.15.2 \
            "ssh -o BatchMode=yes -o StrictHostKeyChecking=no root@192.168.15.4 '
              curl -sf http://localhost:9124/metrics \
                | grep -E \"tape_component_quality_(overall_score|last_run_timestamp)\" \
                | head -4
            '" || echo "METRICAS_NAO_DISPONIVEIS (nao fatal)"
