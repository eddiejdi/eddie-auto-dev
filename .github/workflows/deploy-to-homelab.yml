name: Deploy to Homelab

on:
  pull_request:
    types:
      - labeled
  issues:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      target_runner:
        description: "Onde executar o deploy manual"
        required: false
        default: self-hosted
        type: choice
        options:
          - self-hosted
          - hosted
      run_full_deploy:
        description: "Executar deploy completo da aplicação após publicar o site"
        required: false
        default: false
        type: boolean
      run_selenium:
        description: "Executar Selenium E2E após o deploy manual"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_PATH: /home/edenilson/eddie-auto-dev

jobs:
  detect_selfhost:
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check.outputs.available }}
    steps:
    - name: Check for self-hosted runners
      id: check
      run: |
        set -e
        REPO="${{ github.repository }}"
        echo "Checking self-hosted runners for repo $REPO"

        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          if [ -z "${{ inputs.target_runner }}" ] || [ "${{ inputs.target_runner }}" = "self-hosted" ]; then
            echo "Manual override: using self-hosted runner"
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "Manual override: using hosted runner fallback"
            echo "available=false" >> $GITHUB_OUTPUT
          fi
          exit 0
        fi
        
        # Fetch runners JSON
        RESP=$(curl -s -H 'Accept: application/vnd.github+json' \
          -H 'Authorization: token ${{ secrets.GITHUB_TOKEN }}' \
          https://api.github.com/repos/$REPO/actions/runners)
        
        # Debug: print response summary
        echo "Response: $(echo "$RESP" | jq '.runners | length') runners"
        
        # Check if any runner has label 'homelab' (case-insensitive match)
        FOUND=$(echo "$RESP" | jq -r '.runners[].labels[].name' 2>/dev/null | grep -i "homelab" || true)
        
        if [ -n "$FOUND" ]; then
          echo "Found homelab runner: $FOUND"
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "No homelab runner found"
          echo "available=false" >> $GITHUB_OUTPUT
        fi

  deploy-selfhost:
    needs: detect_selfhost
    if: needs.detect_selfhost.outputs.available == 'true' && ((github.event_name ==
      'pull_request' && (contains(join(' ', github.event.pull_request.labels.*.name),
      'deploy') || github.event.label.name == 'deploy')) || github.event_name == 'workflow_dispatch'
      || startsWith(github.ref, 'refs/heads/feat/remote-orchestrator'))
    runs-on:
      - self-hosted
      - linux
      - homelab
      - homelab-only
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Show runner info
        run: |
          echo "Running on self-hosted runner: $(hostname)"
      - name: Deploy site locally on homelab runner
        run: |
          set -e
          echo "Publishing site/ from $GITHUB_WORKSPACE/site to /var/www/rpa4all.com"
          sudo mkdir -p /var/www/rpa4all.com
          sudo rsync -av --delete --exclude='.git' "$GITHUB_WORKSPACE/site/" /var/www/rpa4all.com/
          sudo chown -R www-data:www-data /var/www/rpa4all.com || true
          sudo nginx -t
          sudo systemctl reload nginx || sudo nginx -s reload
      - name: (Optional) Install RCA scripts and services
        env:
          INSTALL_RCA_SERVICES: ${{ secrets.INSTALL_RCA_SERVICES }}
        run: |
          set -e
          if [ "${INSTALL_RCA_SERVICES:-}" != "1" ]; then
            echo "Skipping RCA install (INSTALL_RCA_SERVICES not set to 1)"
            exit 0
          fi
          bash tools/deploy/install_rca_services.sh
          echo "RCA services installed on self-hosted runner"
      - name: Deploy application on homelab runner
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_full_deploy }}
        run: |
          set -e
          APP_CODE_DIR="$GITHUB_WORKSPACE"
          PYTHON_BIN="$DEPLOY_PATH/.venv/bin/python"
          if [ ! -x "$PYTHON_BIN" ]; then
            echo "Python virtualenv not found at $PYTHON_BIN" >&2
            exit 1
          fi
          cd "$APP_CODE_DIR"
          pkill -f 'uvicorn specialized_agents.api:app --host 0.0.0.0 --port 8503' || true
          nohup "$PYTHON_BIN" -m uvicorn specialized_agents.api:app --host 0.0.0.0 --port 8503 >/tmp/specialized-agents-api.log 2>&1 &
          for _ in $(seq 1 10); do
            if curl --fail --silent http://127.0.0.1:8503/health >/tmp/specialized-agents-health.json; then
              break
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:8503/health >/tmp/specialized-agents-health.json
          cat /tmp/specialized-agents-health.json
  deploy:
    needs: deploy-selfhost
    if: needs.deploy-selfhost.result != 'success' && ((github.event_name == 'pull_request'
      && (contains(join(' ', github.event.pull_request.labels.*.name), 'deploy') ||
      github.event.label.name == 'deploy')) || github.event_name == 'workflow_dispatch'
      || startsWith(github.ref, 'refs/heads/feat/remote-orchestrator'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug event & secrets
        run: |
          set -e

          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"

          echo "Event payload (label or issue):"

          jq -r '.label.name // .issue.label.name // "<no label>"' "$GITHUB_EVENT_PATH" 2>/dev/null || true

          if [ -n "${{ secrets.HOMELAB_SSH_PRIVATE_KEY }}" ]; then echo "HOMELAB_SSH_PRIVATE_KEY=SET"; else echo "HOMELAB_SSH_PRIVATE_KEY=EMPTY"; fi

          if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "SSH_PRIVATE_KEY=SET"; else echo "SSH_PRIVATE_KEY=EMPTY"; fi

          if [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then echo "DEPLOY_SSH_KEY=SET"; else echo "DEPLOY_SSH_KEY=EMPTY"; fi
      - name: Setup SSH key (use available secret)
        run: |
          set -e
          mkdir -p ~/.ssh
          if [ -n "${{ secrets.HOMELAB_SSH_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.HOMELAB_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          elif [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          elif [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          else
            echo "No SSH key secret found (HOMELAB_SSH_PRIVATE_KEY, SSH_PRIVATE_KEY or DEPLOY_SSH_KEY)." >&2
            exit 1
          fi
          chmod 600 ~/.ssh/id_rsa
          if [ -n "${{ secrets.HOMELAB_HOST }}" ]; then
            ssh-keyscan -H ${{ secrets.HOMELAB_HOST }} >> ~/.ssh/known_hosts || true
          fi
      - name: Deploy site to homelab (copy site/ -> /var/www/rpa4all.com)
        if: always()
        env:
          HOMELAB_USER: ${{ secrets.HOMELAB_USER }}
          HOMELAB_HOST: ${{ secrets.HOMELAB_HOST }}
        run: |
          set -e
          TARGET_HOST=${{ secrets.HOMELAB_HOST }}
          TARGET_USER=${{ secrets.HOMELAB_USER }}
          if [ -z "$TARGET_HOST" ] || [ -z "$TARGET_USER" ]; then
            echo "HOMELAB_HOST or HOMELAB_USER not set - skipping site deploy"; exit 0
          fi
          echo "Copying site/ to $TARGET_USER@$TARGET_HOST:/tmp/site_deploy"
          rsync -avz --delete --exclude='.git' site/ "$TARGET_USER@$TARGET_HOST:/tmp/site_deploy/"
          echo "Moving files into place and reloading nginx on remote"
          ssh -o StrictHostKeyChecking=no $TARGET_USER@$TARGET_HOST <<'SSH'
            set -e
            sudo mkdir -p /var/www/rpa4all.com
            sudo rsync -avz --delete /tmp/site_deploy/ /var/www/rpa4all.com/
            sudo chown -R www-data:www-data /var/www/rpa4all.com || true
            if nginx -t >/dev/null 2>&1; then
              sudo systemctl reload nginx || sudo nginx -s reload || true
            else
              echo "nginx config test failed; keeping previous site" >&2
              exit 0
            fi
            rm -rf /tmp/site_deploy
          SSH
      - name: Deploy to homelab (with retry)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_full_deploy }}
        env:
          HOMELAB_USER: ${{ secrets.HOMELAB_USER }}
          HOMELAB_HOST: ${{ secrets.HOMELAB_HOST }}
        run: |
          set -e
          TARGET_HOST=${{ secrets.HOMELAB_HOST }}
          if [ -z "$TARGET_HOST" ]; then
            echo "HOMELAB_HOST secret not set. Use repo secrets to define host." >&2
            exit 1
          fi
          if echo "$TARGET_HOST" | grep -E '^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)' >/dev/null; then
            echo "HOMELAB_HOST appears to be a private IP ($TARGET_HOST). GitHub hosted runners cannot reach private networks."
            echo "Recommended: install a self-hosted runner on your homelab and run the 'Deploy to Homelab (Self-hosted)' workflow (Actions -> Deploy to Homelab (Self-hosted))." >&2
            echo "See docs/DEPLOY_TO_HOMELAB.md and tools/deploy/setup_self_hosted_runner.sh for installation instructions." >&2
            exit 1
          fi
          echo "Deploying to $HOMELAB_USER@$TARGET_HOST"
          ATTEMPTS=3
          for i in $(seq 1 $ATTEMPTS); do
            echo "Attempt $i of $ATTEMPTS"
            ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no $HOMELAB_USER@$TARGET_HOST "cd ${DEPLOY_PATH} && git fetch --all && git checkout main && git pull --ff-only && bash scripts/deployment/deploy_prod.sh"
            if [ $? -eq 0 ]; then
              echo "Deploy succeeded"
              exit 0
            fi
            sleep $((i * 5))
          done
          echo "All attempts failed" >&2
          exit 1

  selenium-e2e:
    name: Selenium E2E
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_selenium }}
    uses: ./.github/workflows/selenium-tests.yml
