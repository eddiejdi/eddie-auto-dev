name: Python CI

on:
  workflow_dispatch: {}
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    paths:
      - 'btc_trading_agent/**'
      - 'tests/**'
      - '.github/workflows/python-ci.yml'

jobs:
  python-tests:
    name: Python Tests
    runs-on: [self-hosted, homelab]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve Python
        shell: bash
        run: |
          PY_BIN="$(command -v python3 || command -v python)"
          if [ -z "$PY_BIN" ]; then
            echo "Python runtime not found on runner" >&2
            exit 1
          fi
          echo "PY_BIN=$PY_BIN" >> "$GITHUB_ENV"
          "$PY_BIN" --version

      - name: Create virtualenv
        shell: bash
        run: |
          "$PY_BIN" -m venv .venv
          echo "${GITHUB_WORKSPACE}/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest requests httpx numpy psycopg2-binary

      - name: Run pytest
        run: |
          pytest -q \
            tests/test_ai_trade_window.py \
            tests/test_buy_target_tolerance.py \
            tests/test_profile_trade_guards.py \
            tests/test_reward_tuning.py \
            tests/test_position_sizing.py \
            tests/test_grafana_dashboard_queries.py
        timeout-minutes: 20
