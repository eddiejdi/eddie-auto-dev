name: Python CI

on:
  workflow_dispatch: {}
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    paths:
      - 'btc_trading_agent/**'
      - 'tests/**'
      - '.github/workflows/python-ci.yml'

jobs:
  python-tests:
    name: Python Tests
    runs-on: [self-hosted, homelab]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pytest requests httpx

      - name: Run pytest
        run: |
          pytest -q \
            tests/test_buy_target_tolerance.py \
            tests/test_profile_trade_guards.py \
            tests/test_reward_tuning.py \
            tests/test_position_sizing.py \
            tests/test_grafana_dashboard_queries.py
        timeout-minutes: 20
