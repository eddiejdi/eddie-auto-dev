name: Register WireGuard Peer (eddie-desktop)

on:
  workflow_dispatch:

jobs:
  register-peer:
    runs-on:
      - self-hosted
      - linux
      - homelab-only
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
        with:
          clean: true
          fetch-depth: 1

      - name: Register eddie-desktop WireGuard peer
        run: |
          set -e
          echo "Runner: $(hostname)"
          echo "Date: $(date -Iseconds)"

          # Executar diretamente no runner (que roda no homelab)
          sudo bash deploy/vpn/add-desktop-peer.sh

      - name: Verify peer
        run: |
          sudo wg show wg0 | grep -A5 "GSm6NSpc" || echo "Peer não visível ainda"
          echo "WireGuard status:"
          sudo systemctl status wg-quick@wg0 2>/dev/null || sudo wg show wg0 2>/dev/null || echo "wg0 ativo via systemd"
