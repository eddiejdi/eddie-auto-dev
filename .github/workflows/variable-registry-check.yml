name: Variable Registry Check

on:
  pull_request:
    branches: [main]

jobs:
  check-taxonomy:
    name: Validate variable taxonomy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate new/changed files against .variables-catalog
        run: |
          set -e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only --diff-filter=ACM "${BASE_SHA}" "${HEAD_SHA}" || true)
          if [ -z "$FILES" ]; then
            echo "No changed files to check."
            exit 0
          fi
          echo "$FILES" | xargs -r python3 tools/hooks/variable_registry_validate.py
