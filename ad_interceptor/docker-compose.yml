version: '3.8'

services:
  android-emulator:
    image: budtmo/docker-android:emulator_14.0
    container_name: android-emulator
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    environment:
      - EMULATOR_DEVICE=Samsung Galaxy S10
      - WEB_VNC=true
      - DATAPARTITION=4096m
      - TZ=America/Sao_Paulo
      - HTTP_PROXY=mitmproxy:8080
      - HTTPS_PROXY=mitmproxy:8080
    ports:
      - "6080:6080"   # noVNC
      - "5555:5555"   # ADB
    volumes:
      - android-data:/root/android-data
    networks:
      - android-net
    healthcheck:
      test: ["CMD-SHELL", "adb shell getprop sys.boot_completed 2>/dev/null | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'

  mitmproxy:
    image: mitmproxy/mitmproxy:latest
    container_name: mitmproxy
    restart: unless-stopped
    command: mitmweb --web-host 0.0.0.0 --web-port 8081 --listen-port 8080 -s /mitmproxy_addon/ad_interceptor_addon.py
    ports:
      - "8090:8081"   # Web UI
    volumes:
      - ../ad_interceptor/mitmproxy_addon:/mitmproxy_addon
      - mitm-data:/home/mitmproxy/.mitmproxy
    networks:
      - android-net

  ad-test-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile.bot
    container_name: ad-test-bot
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
      - ANDROID_EMULATOR_HOST=android-emulator
      - ANDROID_EMULATOR_PORT=5555
      - POSTGRES_HOST=eddie-postgres
      - POSTGRES_PORT=5433
      - POSTGRES_DB=btc_trading
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=eddie_memory_2026
    depends_on:
      - android-emulator
      - mitmproxy
    networks:
      - android-net
      - eddie-net
    healthcheck:
      test: ["CMD-SHELL", "python3 /bot/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  android-data:
    driver: local
  mitm-data:
    driver: local

networks:
  android-net:
    driver: bridge
  eddie-net:
    external: true
