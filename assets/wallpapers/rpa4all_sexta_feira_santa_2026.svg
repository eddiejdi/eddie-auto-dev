<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160" fill="none">
  <defs>
    <!-- Gradiente principal: escuro profundo → azul sereno → lavanda suave -->
    <linearGradient id="bg" x1="0" y1="0" x2="3840" y2="2160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#04101F"/>
      <stop offset="0.30" stop-color="#0B2248"/>
      <stop offset="0.58" stop-color="#1A4680"/>
      <stop offset="0.80" stop-color="#4B8C9A"/>
      <stop offset="1" stop-color="#C5CDE8"/>
    </linearGradient>

    <!-- Aura central: halo de paz/reflexão -->
    <radialGradient id="aura-central" cx="0.5" cy="0.42" r="0.38">
      <stop offset="0" stop-color="#E6E6FA" stop-opacity="0.18"/>
      <stop offset="0.40" stop-color="#87CEFA" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#87CEFA" stop-opacity="0"/>
    </radialGradient>

    <!-- Aura inferior esquerda -->
    <radialGradient id="aura-bottom" cx="0.25" cy="0.85" r="0.35">
      <stop offset="0" stop-color="#E6E6FA" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#E6E6FA" stop-opacity="0"/>
    </radialGradient>

    <!-- Aura superior direita -->
    <radialGradient id="aura-top" cx="0.78" cy="0.18" r="0.30">
      <stop offset="0" stop-color="#87CEFA" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#87CEFA" stop-opacity="0"/>
    </radialGradient>

    <!-- Microgrid -->
    <pattern id="microgrid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" stroke="#E6E6FA" stroke-opacity="0.04" stroke-width="1.5"/>
    </pattern>

    <!-- Gradiente para beam de luz -->
    <linearGradient id="beam-light" x1="800" y1="1600" x2="3000" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E6E6FA" stop-opacity="0.06"/>
      <stop offset="0.50" stop-color="#87CEFA" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Gradiente vertical para texto central -->
    <linearGradient id="text-glow" x1="1920" y1="800" x2="1920" y2="1100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#C5CDE8"/>
    </linearGradient>

    <!-- Marca RPA4All -->
    <symbol id="rpaMark" viewBox="0 0 140 140">
      <polygon points="70,10 83.6,28.2 105.3,21.5 105.6,44.1 127.1,51.5 114,70 127.1,88.5 105.6,95.9 105.3,118.5 83.6,111.8 70,130 56.4,111.8 34.7,118.5 34.4,95.9 12.9,88.5 26,70 12.9,51.5 34.4,44.1 34.7,21.5 56.4,28.2" fill="#FFFFFF" fill-opacity="0.85"/>
      <circle cx="70" cy="70" r="28" fill="#FFFFFF" fill-opacity="0.08"/>
      <circle cx="70" cy="70" r="10" fill="#FFFFFF" fill-opacity="0.55"/>
    </symbol>

    <!-- Filtro glow suave -->
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="text-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Fundo principal -->
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#microgrid)"/>

  <!-- Auras ambiente -->
  <rect width="3840" height="2160" fill="url(#aura-central)"/>
  <rect width="3840" height="2160" fill="url(#aura-bottom)"/>
  <rect width="3840" height="2160" fill="url(#aura-top)"/>

  <!-- Círculo de paz central (halo luminoso) -->
  <circle cx="1920" cy="860" r="500" fill="#E6E6FA" fill-opacity="0.04" filter="url(#soft-glow)"/>
  <circle cx="1920" cy="860" r="340" stroke="#E6E6FA" stroke-opacity="0.08" stroke-width="2" fill="none"/>
  <circle cx="1920" cy="860" r="220" stroke="#87CEFA" stroke-opacity="0.12" stroke-width="1.5" fill="none"/>
  <circle cx="1920" cy="860" r="120" fill="#E6E6FA" fill-opacity="0.06"/>

  <!-- Anéis orbitais sutis (meditação/reflexão) -->
  <g opacity="0.14">
    <ellipse cx="1920" cy="860" rx="580" ry="200" stroke="#C5CDE8" stroke-width="1.5" fill="none" transform="rotate(-8 1920 860)"/>
    <ellipse cx="1920" cy="860" rx="680" ry="260" stroke="#87CEFA" stroke-width="1" fill="none" transform="rotate(5 1920 860)"/>
  </g>

  <!-- Ondas suaves (colinas serenas) -->
  <g opacity="0.55">
    <path d="M0 1780C320 1680 700 1600 1100 1580C1540 1558 1920 1620 2300 1640C2700 1662 3200 1600 3840 1540V2160H0Z" fill="#04101F" fill-opacity="0.40"/>
    <path d="M0 1880C400 1800 860 1740 1300 1720C1780 1698 2160 1760 2560 1770C2980 1782 3400 1740 3840 1680V2160H0Z" fill="#0B2248" fill-opacity="0.35"/>
    <path d="M0 1960C500 1900 960 1860 1440 1850C1920 1840 2400 1870 2880 1880C3200 1888 3520 1870 3840 1840V2160H0Z" fill="#1A4680" fill-opacity="0.25"/>
  </g>

  <!-- Linhas de horizonte suaves -->
  <path d="M0 1780C320 1680 700 1600 1100 1580C1540 1558 1920 1620 2300 1640C2700 1662 3200 1600 3840 1540" stroke="#87CEFA" stroke-opacity="0.10" stroke-width="3" fill="none"/>
  <path d="M0 1880C400 1800 860 1740 1300 1720C1780 1698 2160 1760 2560 1770C2980 1782 3400 1740 3840 1680" stroke="#E6E6FA" stroke-opacity="0.08" stroke-width="2" fill="none"/>

  <!-- Beam de luz diagonal sutil -->
  <path d="M800 1600C1200 1400 1600 1200 2000 1000C2400 800 2700 700 3000 600" stroke="url(#beam-light)" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Estrelas/partículas flutuantes -->
  <g fill="#E6E6FA">
    <circle cx="320" cy="180" r="3" opacity="0.35"/>
    <circle cx="580" cy="420" r="2.5" opacity="0.28"/>
    <circle cx="1050" cy="260" r="3.5" opacity="0.30"/>
    <circle cx="1380" cy="520" r="2" opacity="0.25"/>
    <circle cx="1720" cy="340" r="3" opacity="0.32"/>
    <circle cx="2100" cy="180" r="2.5" opacity="0.28"/>
    <circle cx="2480" cy="440" r="3" opacity="0.30"/>
    <circle cx="2860" cy="280" r="2" opacity="0.26"/>
    <circle cx="3200" cy="380" r="3.5" opacity="0.30"/>
    <circle cx="3540" cy="200" r="2.5" opacity="0.28"/>
    <circle cx="440" cy="780" r="2" opacity="0.22"/>
    <circle cx="980" cy="680" r="2.5" opacity="0.24"/>
    <circle cx="2680" cy="600" r="2" opacity="0.22"/>
    <circle cx="3400" cy="720" r="3" opacity="0.26"/>
    <circle cx="160" cy="1100" r="2" opacity="0.20"/>
    <circle cx="3600" cy="1000" r="2.5" opacity="0.22"/>
  </g>

  <!-- Partículas maiores com glow -->
  <g fill="#87CEFA">
    <circle cx="760" cy="360" r="4" opacity="0.18" filter="url(#text-blur)"/>
    <circle cx="1500" cy="160" r="5" opacity="0.15" filter="url(#text-blur)"/>
    <circle cx="2300" cy="300" r="4" opacity="0.16" filter="url(#text-blur)"/>
    <circle cx="3100" cy="500" r="5" opacity="0.14" filter="url(#text-blur)"/>
  </g>

  <!-- Texto central: Sexta-feira Santa -->
  <g opacity="0.12">
    <text x="1920" y="870" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="400" fill="#FFFFFF" filter="url(#soft-glow)">Sexta-feira Santa</text>
  </g>
  <text x="1920" y="870" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="400" fill="url(#text-glow)" opacity="0.72">Sexta-feira Santa</text>

  <!-- Subtítulo central -->
  <text x="1920" y="950" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="300" letter-spacing="12" fill="#C5CDE8" opacity="0.55">PAZ  ·  REFLEXÃO  ·  INOVAÇÃO</text>

  <!-- Ano -->
  <text x="1920" y="1020" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="300" letter-spacing="18" fill="#87CEFA" opacity="0.35">2 0 2 6</text>

  <!-- Símbolo RPA4All grande ao centro-direita (watermark) -->
  <g transform="translate(2700 240) scale(5)" opacity="0.10">
    <use href="#rpaMark"/>
  </g>

  <!-- Logo RPA4All inferior esquerdo -->
  <g transform="translate(240 1820)">
    <rect x="0" y="0" width="1100" height="220" rx="30" fill="#04101F" fill-opacity="0.35" stroke="#87CEFA" stroke-opacity="0.12" stroke-width="2"/>
    <g transform="translate(56 42)">
      <g transform="scale(1.3)">
        <use href="#rpaMark"/>
      </g>
      <text x="170" y="78" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF" opacity="0.90">RPA4All</text>
      <text x="176" y="128" font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing="6" fill="#C5CDE8" opacity="0.65">PLATAFORMA DE AUTOMAÇÃO E IA</text>
    </g>
  </g>

  <!-- Data no canto inferior direito -->
  <text x="3600" y="2080" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="28" letter-spacing="4" fill="#87CEFA" opacity="0.30">03 DE ABRIL DE 2026</text>

  <!-- Linha decorativa inferior sutil -->
  <line x1="240" y1="2120" x2="3600" y2="2120" stroke="#E6E6FA" stroke-opacity="0.06" stroke-width="1"/>
</svg>
