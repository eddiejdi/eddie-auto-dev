# Nginx location block para Marketing API — RPA4ALL
# Adicionar dentro do server block principal (rpa4all.com)
#
# Instalação:
#   sudo cp marketing-nginx.conf /etc/nginx/snippets/marketing.conf
#   # Adicionar no server block: include snippets/marketing.conf;
#   sudo nginx -t && sudo systemctl reload nginx

# Landing page do diagnóstico
location /diagnostico {
    proxy_pass http://127.0.0.1:8520/diagnostico;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Landing page do Storage
location /storage {
    proxy_pass http://127.0.0.1:8520/storage;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# API de marketing (leads, stats, health)
location /marketing/ {
    proxy_pass http://127.0.0.1:8520/marketing/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CORS headers para o formulário
    add_header Access-Control-Allow-Origin "https://www.rpa4all.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }
}

# Imagens de ads (estáticas)
location /ads/images/ {
    proxy_pass http://127.0.0.1:8520/ads/images/;
    proxy_set_header Host $host;
    expires 30d;
    add_header Cache-Control "public, immutable";
}
