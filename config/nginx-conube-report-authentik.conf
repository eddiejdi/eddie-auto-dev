# Protect the Conube report with Authentik while keeping auth.rpa4all.com
# dedicated to the Authentik UI. The auth hostname is used as an entrypoint
# that redirects to the protected report on www.rpa4all.com, because the
# Authentik root hostname itself is already reserved for the Authentik app.
#
# Apply the auth.rpa4all.com block to the Authentik vhost, the www block to
# the public site vhost, and the api block to the api_internal vhost.

# auth.rpa4all.com
location = /conube-report {
    return 302 https://www.rpa4all.com/conube-report.html;
}

location = /conube-report.html {
    return 302 https://www.rpa4all.com/conube-report.html;
}

location = /conube-report-icon.svg {
    proxy_pass http://127.0.0.1:8503/conube/reports/icon.svg;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_buffering off;
    proxy_read_timeout 30s;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

location ^~ /agents-api/conube/ {
    return 302 https://www.rpa4all.com$request_uri;
}

# www.rpa4all.com and the cloudflared landing vhost
location = /outpost.goauthentik.io/auth/nginx {
    internal;
    proxy_pass http://127.0.0.1:9000/outpost.goauthentik.io/auth/nginx;
    proxy_set_header Host $http_host;
    proxy_set_header X-Original-URL https://$http_host$request_uri;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
}

location /outpost.goauthentik.io/ {
    auth_request off;
    proxy_pass http://127.0.0.1:9000/outpost.goauthentik.io/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Original-URL https://$http_host$request_uri;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Uri $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_redirect http://0.0.0.0:9000/ https://auth.rpa4all.com/;
}

location @goauthentik_proxy_signin {
    internal;
    return 302 https://$http_host/outpost.goauthentik.io/start?rd=https://$http_host$request_uri;
}

location = /conube-report {
    return 302 /conube-report.html;
}

location = /conube-report.html {
    if ($host != "www.rpa4all.com") {
        return 404;
    }
    auth_request /outpost.goauthentik.io/auth/nginx;
    error_page 401 = @goauthentik_proxy_signin;
    root /var/www/rpa4all.com;
    try_files /conube-report.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

location ^~ /agents-api/conube/ {
    if ($host != "www.rpa4all.com") {
        return 403;
    }
    auth_request /outpost.goauthentik.io/auth/nginx;
    error_page 401 = @goauthentik_proxy_signin;
    proxy_pass http://127.0.0.1:8503/conube/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
}

# Any wildcard subdomain routed to the landing vhost should not expose the
# sensitive Conube report API. Return 403 for non-www hosts in that location.
