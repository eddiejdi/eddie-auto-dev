# Entrada no host do Authentik para o estúdio comercial autenticado da RPA4ALL.
#
# auth.rpa4all.com
location = /marketing-studio {
    return 302 https://auth.rpa4all.com/marketing-studio.html;
}

location = /marketing-studio.html {
    root /var/www/rpa4all.com;
    try_files /marketing-studio.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
}

location = /marketing-studio-icon.svg {
    return 302 https://www.rpa4all.com/assets/marketing-studio-icon.svg;
}

location ^~ /agents-api/marketing/ {
    proxy_pass http://127.0.0.1:8503/marketing/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
}

# www.rpa4all.com
location = /marketing-studio {
    return 302 /marketing-studio.html;
}

location = /marketing-studio.html {
    if ($host != "www.rpa4all.com") {
        return 404;
    }
    auth_request /outpost.goauthentik.io/auth/nginx;
    error_page 401 = @goauthentik_proxy_signin;

    auth_request_set $authentik_username $upstream_http_x_authentik_username;
    auth_request_set $authentik_email $upstream_http_x_authentik_email;
    auth_request_set $authentik_name $upstream_http_x_authentik_name;
    auth_request_set $authentik_groups $upstream_http_x_authentik_groups;

    root /var/www/rpa4all.com;
    try_files /marketing-studio.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
}

location ^~ /agents-api/marketing/ {
    if ($host != "www.rpa4all.com") {
        return 403;
    }
    auth_request /outpost.goauthentik.io/auth/nginx;
    error_page 401 = @goauthentik_proxy_signin;

    auth_request_set $authentik_username $upstream_http_x_authentik_username;
    auth_request_set $authentik_email $upstream_http_x_authentik_email;
    auth_request_set $authentik_name $upstream_http_x_authentik_name;
    auth_request_set $authentik_groups $upstream_http_x_authentik_groups;

    proxy_pass http://127.0.0.1:8503/marketing/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-authentik-username $authentik_username;
    proxy_set_header X-authentik-email $authentik_email;
    proxy_set_header X-authentik-name $authentik_name;
    proxy_set_header X-authentik-groups $authentik_groups;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 120s;
}
