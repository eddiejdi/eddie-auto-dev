global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus próprio
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - Métricas do sistema
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor - Métricas de containers
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Storj exporter legado
  - job_name: 'storj-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9651']
        labels:
          instance: 'storj-node'
          service: 'storj'

  # Storj self-heal exporter
  - job_name: 'storj-selfheal'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9212']
        labels:
          instance: 'storj-node'
          service: 'storj'
