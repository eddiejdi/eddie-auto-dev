version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════
# MAILU - Complete Email Server + Webmail
# Complete self-hosted mail server with webmail client
# Credentials managed via Authentik SSO (optional)
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database for Mailu
  # ─────────────────────────────────────────────────────────────────────────
  mailu-db:
    image: postgres:15-alpine
    container_name: mailu-db
    hostname: mailu-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailu
      POSTGRES_USER: mailu
      POSTGRES_PASSWORD: ${MAILU_DB_PASSWORD:-mailu_secure_password_change_me}
    volumes:
      - mailu_db_data:/var/lib/postgresql/data
    networks:
      - mailu_network
      - homelab_monitoring
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mailu"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      # Prometheus metrics (if PostgreSQL exporter is installed)
      prometheus-job: "mailu-postgres"

  # ─────────────────────────────────────────────────────────────────────────
  # Redis Cache for Mailu
  # ─────────────────────────────────────────────────────────────────────────
  mailu-redis:
    image: redis:7-alpine
    container_name: mailu-redis
    hostname: mailu-redis
    restart: unless-stopped
    volumes:
      - mailu_redis_data:/data
    networks:
      - mailu_network
      - homelab_monitoring
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --requirepass ${MAILU_REDIS_PASSWORD:-redis_secure_password_change_me}

  # ─────────────────────────────────────────────────────────────────────────
  # Mailu Frontend (Web Admin Interface)
  # ─────────────────────────────────────────────────────────────────────────
  mailu-frontend:
    image: mailu/nginx:2.0
    container_name: mailu-frontend
    hostname: mailu-frontend
    restart: unless-stopped
    ports:
      # HTTP/HTTPS for Webmail + Admin
      - "${MAILU_HTTP_PORT:-80}:80"
      - "${MAILU_HTTPS_PORT:-443}:443"
      # SMTP
      - "${MAILU_SMTP_PORT:-25}:25"
      # Submission (TLS)
      - "${MAILU_SUBMISSION_PORT:-587}:587"
      # IMAP
      - "${MAILU_IMAP_PORT:-143}:143"
      # IMAPS
      - "${MAILU_IMAPS_PORT:-993}:993"
      # POP3
      - "${MAILU_POP3_PORT:-110}:110"
      # POP3S
      - "${MAILU_POP3S_PORT:-995}:995"
    environment:
      MAILU_DOMAIN: ${MAILU_DOMAIN:-mail.rpa4all.com}
      MAILU_SECRET_KEY: ${MAILU_SECRET_KEY:-change_me_to_a_random_key}
      TLS_FLAVOR: ${MAILU_TLS_FLAVOR:-letsencrypt}
      POSTMASTER: ${POSTMASTER_EMAIL:-postmaster@${MAILU_DOMAIN:-mail.rpa4all.com}}
    volumes:
      - mailu_certs:/certs
      - mailu_overrides:/overrides
      - mailu_dkim:/dkim
    networks:
      - mailu_network
      - homelab_monitoring
    depends_on:
      mailu-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/admin/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Mailu Backend (Core Service)
  # ─────────────────────────────────────────────────────────────────────────
  mailu-backend:
    image: mailu/admin:2.0
    container_name: mailu-backend
    hostname: mailu-backend
    restart: unless-stopped
    environment:
      MAILU_DOMAIN: ${MAILU_DOMAIN:-mail.rpa4all.com}
      MAILU_SECRET_KEY: ${MAILU_SECRET_KEY:-change_me_to_a_random_key}
      MAILU_DB_DRIVER: postgresql
      MAILU_DB_URI: postgresql://mailu:${MAILU_DB_PASSWORD:-mailu_secure_password_change_me}@mailu-db/mailu
      MAILU_REDIS_URI: redis://:${MAILU_REDIS_PASSWORD:-redis_secure_password_change_me}@mailu-redis
      ADMIN: ${ADMIN_EMAIL:-admin@${MAILU_DOMAIN:-mail.rpa4all.com}}
      # AUTH_RATELIMIT: 100/minute
      # RECAPTCHA_PUBLIC_KEY: ""
      # RECAPTCHA_PRIVATE_KEY: ""
      # OAuth2 / OIDC for Authentik (optional)
      # ENABLE_OAUTH2: true
      # OAUTH2_PROVIDER_URL: https://auth.rpa4all.com
      # OAUTH2_CLIENT_ID: mailu-client
      # OAUTH2_CLIENT_SECRET: ${MAILU_OAUTH2_SECRET:-change_me}
    volumes:
      - mailu_data:/data
      - mailu_dkim:/dkim
      - mailu_overrides:/overrides
    networks:
      - mailu_network
      - homelab_monitoring
    depends_on:
      mailu-db:
        condition: service_healthy
      mailu-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/admin/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Postfix SMTP Server
  # ─────────────────────────────────────────────────────────────────────────
  mailu-postfix:
    image: mailu/postfix:2.0
    container_name: mailu-postfix
    hostname: mailu-postfix
    restart: unless-stopped
    environment:
      MAILU_DOMAIN: ${MAILU_DOMAIN:-mail.rpa4all.com}
      MAILU_SECRET_KEY: ${MAILU_SECRET_KEY:-change_me_to_a_random_key}
    volumes:
      - mailu_mailqueue:/queue
      - mailu_overrides:/overrides
      - /var/log/syslog:/var/log/syslog:ro
    networks:
      - mailu_network
      - homelab_monitoring
    depends_on:
      - mailu-backend
    healthcheck:
      test: ["CMD", "postfix", "check"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Dovecot IMAP/POP3 Server
  # ─────────────────────────────────────────────────────────────────────────
  mailu-dovecot:
    image: mailu/dovecot:2.0
    container_name: mailu-dovecot
    hostname: mailu-dovecot
    restart: unless-stopped
    environment:
      MAILU_DOMAIN: ${MAILU_DOMAIN:-mail.rpa4all.com}
      MAILU_SECRET_KEY: ${MAILU_SECRET_KEY:-change_me_to_a_random_key}
    volumes:
      - mailu_maildata:/mail
      - mailu_overrides:/overrides
    networks:
      - mailu_network
      - homelab_monitoring
    depends_on:
      - mailu-backend
    healthcheck:
      test: ["CMD", "doveadm", "auth", "test"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Roundcube Webmail Client
  # ─────────────────────────────────────────────────────────────────────────
  mailu-roundcube:
    image: mailu/roundcube:2.0
    container_name: mailu-roundcube
    hostname: mailu-roundcube
    restart: unless-stopped
    environment:
      MAILU_DOMAIN: ${MAILU_DOMAIN:-mail.rpa4all.com}
      MAILU_SECRET_KEY: ${MAILU_SECRET_KEY:-change_me_to_a_random_key}
      MAILU_REDIS_URI: redis://:${MAILU_REDIS_PASSWORD:-redis_secure_password_change_me}@mailu-redis
      # Roundcube specific settings
      ROUNDCUBE_SKIN: elastic
      ROUNDCUBE_DEFAULT_HOST: mailu-dovecot
      ROUNDCUBE_DEFAULT_PORT: 143
    volumes:
      - mailu_roundcube_data:/data
      - mailu_overrides:/overrides
    networks:
      - mailu_network
      - homelab_monitoring
    depends_on:
      - mailu-dovecot
      - mailu-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Postfix Exporter for Prometheus
  # Monitors Postfix queue, throughput, and SMTP connections
  # ─────────────────────────────────────────────────────────────────────────
  postfix-exporter:
    image: boynux/postfix-exporter:latest
    container_name: postfix-exporter
    hostname: postfix-exporter
    restart: unless-stopped
    environment:
      POSTFIX_LOG_PATH: /var/log/mail.log
      POSTFIX_SHOWQ_PATH: /var/spool/postfix/public/showq
    volumes:
      - /var/log:/var/log:ro
      - /var/spool/postfix:/var/spool/postfix:ro
    ports:
      - "${POSTFIX_EXPORTER_PORT:-9307}:9307"
    networks:
      - homelab_monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9307/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Optional: Dovecot Exporter for Prometheus
  # Monitors IMAP/POP3 connections and login attempts
  # ─────────────────────────────────────────────────────────────────────────
  # dovecot-exporter:
  #   image: christianhelle/dovecot-exporter:latest
  #   container_name: dovecot-exporter
  #   hostname: dovecot-exporter
  #   restart: unless-stopped
  #   environment:
  #     DOVECOT_HOST: mailu-dovecot
  #     DOVECOT_PORT: 12345
  #   ports:
  #     - "${DOVECOT_EXPORTER_PORT:-9308}:9308"
  #   networks:
  #     - homelab_monitoring
  #   depends_on:
  #     - mailu-dovecot

  # ─────────────────────────────────────────────────────────────────────────
  # ClamAV Antivirus (Optional - for scanning emails)
  # ─────────────────────────────────────────────────────────────────────────
  # mailu-clamav:
  #   image: mailu/clamav:2.0
  #   container_name: mailu-clamav
  #   hostname: mailu-clamav
  #   restart: unless-stopped
  #   volumes:
  #     - mailu_clamav:/var/lib/clamav
  #   networks:
  #     - mailu_network
  #   healthcheck:
  #     test: ["CMD", "clamdscan", "--version"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

networks:
  mailu_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16
  homelab_monitoring:
    external: true
    # Reference existing network from docker-compose-exporters.yml

volumes:
  # Database
  mailu_db_data:
    driver: local
  
  # Cache
  mailu_redis_data:
    driver: local
  
  # Mail data
  mailu_maildata:
    driver: local
  mailu_mailqueue:
    driver: local
  
  # Admin data
  mailu_data:
    driver: local
  
  # Security (Certificates, DKIM)
  mailu_certs:
    driver: local
  mailu_dkim:
    driver: local
  
  # Configuration overrides
  mailu_overrides:
    driver: local
  
  # Webmail
  mailu_roundcube_data:
    driver: local
  
  # Optional: Antivirus
  # mailu_clamav:
  #   driver: local
