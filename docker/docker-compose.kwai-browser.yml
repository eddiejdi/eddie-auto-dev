# Isolated Chromium browser for Kwai reward/visualization tasks.
# Runs EXCLUSIVELY on the homelab server (192.168.15.2) — no local workstation access.
# Access via SSH tunnel only: ssh -L 3016:127.0.0.1:3016 homelab@192.168.15.2
# Then open https://localhost:3016/ (accept self-signed certificate)
#
# VPN/Proxy bypass: this container must reach kwai.com directly.
# Add *.kwai.com and m-wallet.kwai.com to proxy bypass list on the homelab host.
services:
  kwai-browser:
    image: lscr.io/linuxserver/chromium:latest
    container_name: kwai-browser
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - CHROME_CLI=https://www.kwai.com/discover
      - CUSTOM_USER=${REWARDS_BROWSER_USER:-rewards}
      - PASSWORD=${REWARDS_BROWSER_PASSWORD:?set REWARDS_BROWSER_PASSWORD in .env}
      # Explicit no-proxy for Kwai domains (bypass corporate/VPN proxy)
      - no_proxy=kwai.com,.kwai.com,m-wallet.kwai.com,m-creative.kwai.com
      - NO_PROXY=kwai.com,.kwai.com,m-wallet.kwai.com,m-creative.kwai.com
    volumes:
      - /home/homelab/docker/kwai-browser/config:/config
    ports:
      - "127.0.0.1:3016:3001"
    shm_size: "1gb"
    restart: unless-stopped
    # Isolated network: prefer host or dedicated bridge without VPN routing
    network_mode: "bridge"