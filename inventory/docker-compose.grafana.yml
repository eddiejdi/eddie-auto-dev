version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - /home/homelab/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/homelab/monitoring/prometheus:/etc/prometheus/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=Rpa_four_all!
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.rpa4all.com/
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authentik
      - GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP=true
      - GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN=false
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=authentik-grafana
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=grafana-sso-secret-2026
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid email profile
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'Grafana Admins') && 'Admin' || 'Viewer'
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.rpa4all.com/application/o/authorize/
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.rpa4all.com/application/o/token/
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.rpa4all.com/application/o/userinfo/
      - GF_AUTH_SIGNOUT_REDIRECT_URL=https://auth.rpa4all.com/application/o/grafana/end-session/
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=172.17.0.1:5433
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=postgres
      - GF_DATABASE_PASSWORD=eddie_memory_2026
      - GF_DATABASE_SSL_MODE=disable
    volumes:
      - grafana_data:/var/lib/grafana
      - /home/homelab/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
