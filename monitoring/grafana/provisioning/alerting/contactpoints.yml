# Grafana Unified Alerting — Contact Points (Telegram)
# Provisionado automaticamente pelo shared-auto-dev
# Docs: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting-resources/file-provisioning/
apiVersion: 1

contactPoints:
  - orgId: 1
    name: eddie-telegram
    receivers:
      - uid: eddie-telegram-receiver
        type: telegram
        disableResolveMessage: false
        settings:
          bottoken: "1105143633:AAG5BrfOsGbV88BFztljR7fH5ekmszFnulA"
          chatid: "948686300"
          disable_web_page_preview: false
          protect_content: false
          message: |
            {{ if eq .Status "firing" }}🔴{{ else }}🟢{{ end }} {{ .Status | toUpper }}
            
            {{ range .Alerts }}
            {{ .Labels.alertname }}
            Severidade: {{ .Labels.severity }}
            {{ if .Labels.profile }}Perfil: {{ .Labels.profile }}{{ end }}
            {{ if .Annotations.summary }}📋 {{ .Annotations.summary }}{{ end }}
            {{ if .Annotations.description }}📝 {{ .Annotations.description }}{{ end }}
            {{ if .Values }}Valor: {{ .Values }}{{ end }}
            {{ end }}
  - orgId: 1
    name: eddie-ltfs-webhook
    receivers:
      - uid: eddie-ltfs-webhook-receiver
        type: webhook
        disableResolveMessage: false
        settings:
          url: "http://192.168.15.2:5001/alerts"
          httpMethod: POST
          maxAlerts: "0"
