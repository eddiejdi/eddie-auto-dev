        refId: B
        type: reduce
    - refId: C
      relativeTimeRange:
        from: 900
        to: 0
      datasourceUid: __expr__
      model:
        type: threshold
        refId: C
        conditions:
        - evaluator:
            type: gt
            params:
            - 3
          operator:
            type: and
          reducer:
            type: last
          query:
            params:
            - B
        expression: B
    for: 0s
    labels:
      severity: warning
      category: trading
      coin: BTC
    annotations:
      summary: BTC subiu mais de 3% nos últimos 15 minutos!
      description: 'Variação: {{ $values.A }}%. Possível pump - considerar take profit.'
