    execErrState: OK
  - uid: alert-btc-price-pump
    title: BTC Pump Rápido (> 3% em 15min)
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 900
        to: 0
      datasourceUid: dfc0w4yioe4u8e
      model:
        expr: ((btc_price - btc_price offset 15m) / btc_price offset 15m) * 100
        instant: true
        refId: A
    - refId: B
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        expression: A
        reducer: last
        refId: B
        type: reduce
    - refId: C
      relativeTimeRange:
        from: 900
        to: 0
      datasourceUid: __expr__
      model:
        type: threshold
        refId: C
        conditions:
        - evaluator:
            type: gt
            params:
            - 3
          operator:
            type: and
          reducer:
            type: last
          query:
            params:
            - B
        expression: B
    for: 0s
    labels:
      severity: warning
      category: trading
      coin: BTC
    annotations:
      summary: BTC subiu mais de 3% nos últimos 15 minutos!
      description: 'Variação: {{ $values.A }}%. Possível pump - considerar take profit.'
    noDataState: OK
    execErrState: OK
