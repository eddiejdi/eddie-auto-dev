global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'prometheus/ltfs-selfheal-rules.yml'
# selfhealing_rules.yml e alerts.yml desabilitados: contêm PromQL inválido (for: dentro de expr)

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['172.17.0.1:9100']
        labels:
          instance: 'node-exporter:9100'
  
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'agent-network-exporter'
    static_configs:
      - targets: ['agent-exporter-bridge:9101']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'autocoinbot-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['172.17.0.1:9092']
        labels:
          coin: 'BTC-USDT'
          instance: 'btc_usdt'

  - job_name: 'crypto-exporter-eth_usdt'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9098']
        labels:
          coin: 'ETH-USDT'
          instance: 'eth_usdt'

  - job_name: 'crypto-exporter-btc_usdt_conservative'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9094']
        labels:
          coin: 'BTC-USDT'
          instance: 'btc_usdt_conservative'
          profile: 'conservative'

  - job_name: 'crypto-exporter-btc_usdt_aggressive'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9095']
        labels:
          coin: 'BTC-USDT'
          instance: 'btc_usdt_aggressive'
          profile: 'aggressive'

  - job_name: 'crypto-exporter-doge_usdt'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9096']
        labels:
          coin: 'DOGE-USDT'
          instance: 'doge_usdt'

  - job_name: 'crypto-exporter-ada_usdt'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9097']
        labels:
          coin: 'ADA-USDT'
          instance: 'ada_usdt'

  - job_name: 'crypto-exporter-usdt_brl_conservative'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9112']
        labels:
          coin: 'USDT-BRL'
          instance: 'usdt_brl_conservative'
          profile: 'conservative'

  - job_name: 'crypto-exporter-usdt_brl_aggressive'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9113']
        labels:
          coin: 'USDT-BRL'
          instance: 'usdt_brl_aggressive'
          profile: 'aggressive'

  - job_name: 'clear-b3-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['172.17.0.1:9102']
        labels:
          symbol: 'PETR4'
          market: 'B3'

  - job_name: 'storj-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9651']
        labels:
          instance: 'storj-node'
          service: 'storj'

  - job_name: 'storj-selfheal'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9212']
        labels:
          instance: 'storj-node'
          service: 'storj'
  
  - job_name: 'nas-node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['192.168.15.4:9100']
        labels:
          instance: 'rpa4all-nas-001'
          role: 'nas'
