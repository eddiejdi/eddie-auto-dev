global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'prometheus/alerts.yml'  # Se existir

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
  
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'agent-network-exporter'
    static_configs:
      - targets: ['agent-exporter-bridge:9101']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'autocoinbot-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['172.17.0.1:9092']
        labels:
          coin: 'BTC-USDT'
          instance: 'btc_usdt'

  - job_name: 'crypto-exporter-eth_usdt'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9098']
        labels:
          coin: 'ETH-USDT'
          instance: 'eth_usdt'

  - job_name: 'crypto-exporter-btc_usdt_conservative'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9094']
        labels:
          coin: 'BTC-USDT'
          instance: 'btc_usdt_conservative'
          profile: 'conservative'

  - job_name: 'crypto-exporter-btc_usdt_aggressive'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9095']
        labels:
          coin: 'BTC-USDT'
          instance: 'btc_usdt_aggressive'
          profile: 'aggressive'

  - job_name: 'crypto-exporter-doge_usdt'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9096']
        labels:
          coin: 'DOGE-USDT'
          instance: 'doge_usdt'

  - job_name: 'crypto-exporter-ada_usdt'
    scrape_interval: 30s
    static_configs:
      - targets: ['172.17.0.1:9097']
        labels:
          coin: 'ADA-USDT'
          instance: 'ada_usdt'

  - job_name: 'conube-exporter'
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['172.17.0.1:9662']
        labels:
          instance: 'conube'
          service: 'conube-agent'

  - job_name: 'storj-exporter'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['172.17.0.1:9651']
        labels:
          instance: 'storj-node'
          service: 'storj'

  - job_name: 'storj-selfheal'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['172.17.0.1:9652']
        labels:
          instance: 'storj-selfheal'
          service: 'storj'
