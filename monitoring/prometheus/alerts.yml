groups:
  - name: conube_alerts
    interval: 30s
    rules:
      - alert: ConubeExporterDown
        expr: conube_exporter_up == 0
        for: 5m
        labels:
          severity: critical
          component: conube
        annotations:
          summary: "Conube exporter indisponivel"
          description: "O exporter da Conube nao concluiu coleta valida por mais de 5 minutos."

      - alert: ConubeCertificateExpired
        expr: conube_certificate_expired == 1
        for: 10m
        labels:
          severity: critical
          component: conube
        annotations:
          summary: "Certificado digital da Conube expirado"
          description: "O e-CNPJ permanece expirado e o faturamento segue bloqueado."

      - alert: ConubeBillingBlocked
        expr: conube_billing_blocked == 1
        for: 15m
        labels:
          severity: warning
          component: conube
        annotations:
          summary: "Faturamento bloqueado na Conube"
          description: "A operacao de emissao fiscal continua bloqueada no portal da Conube."

      - alert: ConubeOpenFinancialPeriods
        expr: conube_open_periods_total > 0
        for: 30m
        labels:
          severity: warning
          component: conube
        annotations:
          summary: "Ha periodos financeiros abertos na Conube"
          description: "Existem {{ $value | humanize }} periodos em aberto aguardando tratativa."

      - alert: ConubeOverdueItemsHigh
        expr: conube_overdue_items_total >= 5
        for: 30m
        labels:
          severity: warning
          component: conube
        annotations:
          summary: "Pendencias em atraso elevadas na Conube"
          description: "A Conube reporta {{ $value | humanize }} pendencias em atraso."
