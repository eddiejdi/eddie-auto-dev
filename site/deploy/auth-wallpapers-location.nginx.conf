# Incluir este bloco dentro do server de auth.rpa4all.com.
# Exemplo de root publicado: /var/www/auth-rpa4all/wallpapers

location /wallpapers/ {
    alias /var/www/auth-rpa4all/wallpapers/;
    index index.html;
    try_files $uri $uri/ /wallpapers/index.html;

    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
}

location /wallpapers/assets/ {
    alias /var/www/auth-rpa4all/wallpapers/assets/;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=300" always;
    add_header X-Content-Type-Options "nosniff" always;
}

location /wallpapers/requests/ {
    alias /var/www/auth-rpa4all/wallpapers/requests/;
    try_files $uri =404;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
}