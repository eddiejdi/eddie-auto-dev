# Validação de config.json antes de iniciar o BTC Trading Agent
# Protege contra incidentes como GPT-5.1 (2026-03-05) que alterou dry_run
# Instalação: sudo mkdir -p /etc/systemd/system/btc-trading-agent.service.d
#             sudo cp systemd/btc-trading-agent-validate.conf \
#               /etc/systemd/system/btc-trading-agent.service.d/validate.conf
#             sudo install -D -m 0644 systemd/validate_btc_config.py \
#               /apps/crypto-trader/trading/systemd/validate_btc_config.py
#             sudo systemctl daemon-reload
[Service]
ExecStartPre=/usr/bin/python3 /apps/crypto-trader/trading/systemd/validate_btc_config.py
