# DNS-over-TLS (DoT) proxy para Android Private DNS
# Adicionar ao FINAL do /etc/nginx/nginx.conf (FORA do bloco http{})
#
# Deploy:
#   sudo cp nginx-dns-over-tls.conf /tmp/ && \
#   grep -q "^stream" /etc/nginx/nginx.conf || sudo cat /tmp/nginx-dns-over-tls.conf >> /etc/nginx/nginx.conf && \
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certificado: certbot --dns-cloudflare -d dns.rpa4all.com
# Renovação automática via certbot timer
#
# Android: Configurações → Rede → DNS Privado → dns.rpa4all.com

stream {
    upstream dns_backend {
        server 127.0.0.1:53;
    }

    server {
        listen 853 ssl;
        listen [::]:853 ssl;

        ssl_certificate /etc/letsencrypt/live/dns.rpa4all.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dns.rpa4all.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_handshake_timeout 10s;

        proxy_pass dns_backend;
    }
}
