# Ordering: garantir que nvidia-persistenced esteja ativo antes do Ollama
# Instalação: sudo cp systemd/ollama-gpu-boot-order.conf \
#               /etc/systemd/system/ollama.service.d/gpu-boot-order.conf
#             sudo systemctl daemon-reload
[Unit]
After=nvidia-persistenced.service
Wants=nvidia-persistenced.service

[Service]
# Aguardar GPU estar pronta via nvidia-smi (máx 30s)
ExecStartPre=/bin/bash -c 'for i in $(seq 1 30); do nvidia-smi --query-gpu=name --format=csv,noheader &>/dev/null && exit 0; sleep 1; done; echo "WARN: GPU não detectada após 30s, iniciando sem GPU"; exit 0'
