[Unit]
After=network-online.target basic.target

[Service]
# Modelos armazenados no RAID1
Environment=OLLAMA_MODELS=/mnt/raid1/ollama/models
# Ollama usa cores 3-15; cores 0-2 livres para SO (isolcpus removido do GRUB 2026-03-01)
CPUAffinity=3-15
Type=simple
Restart=always
RestartSec=5

# THREAD DISTRIBUTION
Environment=GGML_NUM_THREADS=9
Environment=OLLAMA_NUM_THREADS=9
Environment=OMP_NUM_THREADS=9
Environment=OMP_THREAD_LIMIT=13
Environment=MKL_NUM_THREADS=9
Environment=OPENBLAS_NUM_THREADS=9
Environment=OMP_PROC_BIND=spread
Environment=OMP_PLACES=threads
Environment=GOMP_CPU_AFFINITY=3-15
Environment=GOMAXPROCS=6

# SINGLE GPU MODE — GPU0 only (RTX 2060 SUPER 8GB)
# GPU1 (GTX 1050 2GB) é gerenciada pelo ollama-gpu1.service separado
# NOTA: CUDA_VISIBLE_DEVICES=0 removido (Ollama 0.17.2 timeout na GPU discovery)
# GPU0 é selecionada naturalmente via OLLAMA_SCHED_SPREAD=false + OLLAMA_MAX_LOADED_MODELS=1
Environment=OLLAMA_NUM_GPU=999
Environment=OLLAMA_HOST=0.0.0.0:11434
Environment=OLLAMA_LOAD_TIMEOUT=15m
Environment=OLLAMA_KEEP_ALIVE=-1

# GPU0 dedicada — sem spread (cada instância tem sua GPU)
Environment=OLLAMA_SCHED_SPREAD=false
Environment=OLLAMA_GPU_OVERHEAD=536870912

# KV + paralelismo
Environment=OLLAMA_KV_CACHE_TYPE=q4_0
Environment=OLLAMA_FLASH_ATTENTION=true
Environment=OLLAMA_NUM_PARALLEL=1
Environment=OLLAMA_MAX_LOADED_MODELS=1

ExecStart=
ExecStart=/usr/local/bin/ollama serve

# Pré-carrega phi4-mini permanentemente após iniciar (modelo padrão GPU0)
ExecStartPost=/bin/bash -c 'sleep 8 && OLLAMA_HOST=http://127.0.0.1:11434 /usr/local/bin/ollama run phi4-mini "" 2>/dev/null || true'

# GPU0 fix: restaurado CUDA_VISIBLE_DEVICES (bug 0.17.2 corrigido em 0.17.6)
Environment=CUDA_VISIBLE_DEVICES=0
