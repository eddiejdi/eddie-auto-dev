# radvd config - Pi-hole DNS via IPv6 RA (RDNSS)
# Fix: IPv6 DNS leak - forçar Pi-hole como DNS IPv6 preferencial
# Atualizado em 2026-03-04: global IPv6 + lifetime maior (600s)
#
# Deploy: sudo cp radvd.conf /etc/radvd.conf && sudo systemctl restart radvd

interface eth-onboard
{
    AdvSendAdvert on;
    MinRtrAdvInterval 5;
    MaxRtrAdvInterval 20;

    # NÃO ser default router (manter roteador ISP como gateway)
    AdvDefaultLifetime 0;
    AdvManagedFlag off;
    AdvOtherConfigFlag on;
    AdvDefaultPreference high;

    # RDNSS: Pi-hole IPv6 global (preferido por Android/iOS)
    RDNSS 2804:7f0:9342:bca1:2e0:4cff:feb6:3d5e
    {
        AdvRDNSSLifetime 600;
    };

    # RDNSS: Pi-hole IPv6 link-local (fallback estável)
    RDNSS fe80::2e0:4cff:feb6:3d5e
    {
        AdvRDNSSLifetime 600;
    };
};
