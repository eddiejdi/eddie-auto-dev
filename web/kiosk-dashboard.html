<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafana Homelab — Kiosk Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1e1e1e;
            color: #fff;
            overflow: hidden;
        }
        #container { width: 100vw; height: 100vh; position: relative; }
        .dashboard-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }
        .dashboard-frame.active { opacity: 1; z-index: 10; }
        ::-webkit-scrollbar { width: 0; height: 0; }
        #indicator {
            position: fixed;
            bottom: 12px;
            right: 15px;
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 200;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transition: background 0.4s;
            cursor: pointer;
        }
        .dot.active { background: rgba(0, 208, 132, 0.9); box-shadow: 0 0 6px rgba(0,208,132,0.7); }
        .dot.trading-conservative { border: 1px solid rgba(100, 180, 255, 0.6); }
        .dot.trading-aggressive  { border: 1px solid rgba(255, 160, 60, 0.6); }
        .dot.trading-shadow      { border: 1px solid rgba(180, 100, 255, 0.6); }
        #timer-bar {
            position: fixed;
            bottom: 0; left: 0;
            height: 2px;
            background: rgba(0, 208, 132, 0.6);
            width: 0%;
            z-index: 200;
            transition: width linear;
        }
        #page-label {
            position: fixed;
            bottom: 28px;
            right: 15px;
            font-size: 10px;
            color: rgba(255,255,255,0.35);
            z-index: 200;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Trading: Conservative -->
        <iframe id="frame-0" class="dashboard-frame active" title="Trading Conservative"
            src="http://192.168.15.2:3002/d/btc-trading-monitor/btc-trading-monitor?kiosk&refresh=1m&var-profile=conservative"
            allow="fullscreen"></iframe>

        <!-- Trading: Aggressive -->
        <iframe id="frame-1" class="dashboard-frame" title="Trading Aggressive"
            src="http://192.168.15.2:3002/d/btc-trading-monitor/btc-trading-monitor?kiosk&refresh=1m&var-profile=aggressive"
            allow="fullscreen"></iframe>

        <!-- Trading: Shadow -->
        <iframe id="frame-2" class="dashboard-frame" title="Trading Shadow"
            src="http://192.168.15.2:3002/d/btc-trading-monitor/btc-trading-monitor?kiosk&refresh=1m&var-profile=shadow"
            allow="fullscreen"></iframe>

        <!-- Homelab System Monitor -->
        <iframe id="frame-3" class="dashboard-frame" title="Homelab System Monitor"
            src="http://192.168.15.2:3002/d/homelab-btop/homelab-system-monitor-btop?kiosk&refresh=5m"
            allow="fullscreen"></iframe>

        <!-- Akash Network Provider -->
        <iframe id="frame-4" class="dashboard-frame" title="Akash Network Provider"
            src="http://192.168.15.2:3002/d/73dbe362-d884-4205-a6c9-24afbd4b03af/akash-network-provider?kiosk&refresh=30s"
            allow="fullscreen"></iframe>
    </div>

    <div id="page-label"></div>
    <div id="indicator">
        <div class="dot trading-conservative active" data-idx="0" title="Trading Conservative"></div>
        <div class="dot trading-aggressive"          data-idx="1" title="Trading Aggressive"></div>
        <div class="dot trading-shadow"              data-idx="2" title="Trading Shadow"></div>
        <div class="dot" data-idx="3" title="Homelab System"></div>
        <div class="dot" data-idx="4" title="Akash Provider"></div>
    </div>
    <div id="timer-bar"></div>

    <script>
        const INTERVAL = 60000; // 60s per page
        const LABELS = [
            '📈 conservative',
            '🔥 aggressive',
            '👤 shadow',
            '🖥️ homelab',
            '☁️ akash'
        ];
        const frames = document.querySelectorAll('.dashboard-frame');
        const dots   = document.querySelectorAll('.dot');
        const bar    = document.getElementById('timer-bar');
        const lbl    = document.getElementById('page-label');
        let current  = 0;
        let startTs  = Date.now();

        function showFrame(idx) {
            frames.forEach((f, i) => f.classList.toggle('active', i === idx));
            dots.forEach((d, i)   => d.classList.toggle('active', i === idx));
            lbl.textContent = LABELS[idx] || '';
            current = idx;
            startTs = Date.now();
        }

        function tick() {
            const elapsed = Date.now() - startTs;
            const pct     = Math.min(elapsed / INTERVAL * 100, 100);
            bar.style.width = pct + '%';
            if (elapsed >= INTERVAL) {
                showFrame((current + 1) % frames.length);
            }
            requestAnimationFrame(tick);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape')     window.location.href = 'http://192.168.15.2:3002/';
            if (e.key === 'ArrowRight') showFrame((current + 1) % frames.length);
            if (e.key === 'ArrowLeft')  showFrame((current - 1 + frames.length) % frames.length);
        });

        dots.forEach((d) => d.addEventListener('click', () => showFrame(parseInt(d.dataset.idx))));

        lbl.textContent = LABELS[0];
        requestAnimationFrame(tick);
    </script>
</body>
</html>
